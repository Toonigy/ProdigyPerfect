.full-nav-button {
    /* Layout & Sizing */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 10px;
    box-sizing: border-box; /* Ensures padding doesn't break 100% width */

    /* Typography */
    font-size: 1.3rem;
    font-weight: bold;
    color: #ffffff;
    text-align: center;
    text-decoration: none;

    /* Visuals */
    background-color: #6579DC;
    border: 1px solid #596ED9;
    border-top: none;
    cursor: pointer;
    
    /* Animation */
    transition: background-color 0.2s ease, transform 0.1s ease;
}

/* Hover & Focus States */
.full-nav-button:hover,
.full-nav-button:focus {
    background-color: #5568C9; /* Slightly darker shade */
    outline: none;
}

/* Active (Click) State */
.full-nav-button:active {
    transform: scale(0.98); /* Subtle "pressed" effect */
}
        
        .full-nav-button:hover {
            background: none;
            background-color: #596ED9;
            border: none;

        .announcement {

#first-loading-screen {
    /* Ensures it covers the entire viewport regardless of parent constraints */
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    
    /* Layout for centering a logo or spinner later */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    /* More vibrant, multi-stop gradient for depth */
    background: linear-gradient(180deg, #ffc988 0%, #fcb576 50%, #f39c56 100%);
    
    /* Subtle breathing animation */
    animation: pulseGradient 4s ease-in-out infinite alternate;
    overflow: hidden;
}

/* Optional: Adds a soft "glow" movement to the background */
@keyframes pulseGradient {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.08); }
}

.game-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 24px; /* Added internal spacing */
    box-sizing: border-box;
    
    /* 3D Border & Shadow */
    border: 2px solid #363636;
    background-color: #f0f0f0; /* Placeholder background */
    box-shadow: 0 4px 0 0 #25152d; /* Solid shadow for depth */
    border-radius: 12px; /* Slightly rounder for a "friendly" game feel */
    
    /* Typography */
    font-family: 'Paytone One', sans-serif;
    text-decoration: none;
    color: #363636;
    font-size: 1.2rem;
    
    /* Layout */
    min-width: 300px;
    margin-bottom: 14px; /* Increased to account for the shadow depth */
    
    /* Interactivity */
    cursor: pointer;
    position: relative;
    transition: all 0.1s ease;
    user-select: none;
}

/* Hover Effect: Lifts the button slightly */
.game-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 0 #25152d;
}

/* Active State: The "Press" effect */
.game-button:active {
    transform: translateY(4px); /* Moves down by the height of the shadow */
    box-shadow: 0 0 0 0 #25152d; /* Shadow disappears to simulate being pressed flat */
}

.game-button-inner {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* Spacing & Layout */
    margin: 4px;
    padding: 8px 12px; /* Adjusted for better click target feel */
    border-radius: 5px;
    
    /* Typography */
    font-size: 1.15rem; /* ~18.4px for better scaling */
    line-height: 1.2;
    text-align: center;
    text-transform: uppercase; /* Often looks better in game menus */
    letter-spacing: 0.5px;
    
    /* Visual Depth */
    background-color: rgba(255, 255, 255, 0.1); /* Subtle tint */
    box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.2), 
                inset 0 -2px 0 rgba(0, 0, 0, 0.1);
    
    /* Smoothness */
    transition: background-color 0.1s ease;
}

/* Hover effect for the inner glow */
.game-button:hover .game-button-inner {
    background-color: rgba(255, 255, 255, 0.2);
}
		
.game-button-sapphire {
    /* Richer, more vibrant gradient */
    background-image: linear-gradient(to bottom, #5bb0ff 0%, #45a0dd 45%, #4162c0 100%);
    
    /* Top highlight to simulate "rim lighting" */
    border-top: 2px solid rgba(255, 255, 255, 0.4);
    
    /* Contrast & Typography */
    color: #ffffff;
    text-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
    
    /* Depth effect */
    box-shadow: 0 4px 0 0 #2b458a; /* Darker navy for the 3D base */
    
    transition: filter 0.2s ease;
}

		.game-button-sapphire .game-button-inner {

.game-button-sapphire:hover {

		.game-button-sapphire:hover .game-button-inner {

.game-button-sapphire:active {

.game-button-sapphire:active .game-button-inner {
    /* Slightly darker, more saturated gradient to simulate being in shadow */

        var prodigyWeb = {};
        prodigyWeb.country = undefined;
        prodigyWeb.gameVersion = '3-15-3';

        window.onload = function() {
            document.addEventListener("contextmenu", function(e) {
                e.preventDefault();
            }, false);
            Boot.init();
        };

    <script>
        $('.announcement-close').click(function() {
            $('#service-announcement').remove();
        });
        var ua = navigator.userAgent,
            isiOS = /iPad/i.test(ua) || /iPhone/i.test(ua);

        prodigyWeb.membershipFlow = {
            $el: $("#membership-flow"),
            $game: $("#game-wrapper"),
            student: {
                name: undefined,
                userID: undefined
            },
            closeCallback: undefined,
            open: function(username, userID, callback, tag) {
                this.student.name = username;
                this.student.userID = userID;
                this.closeCallback = callback;
                var flowURL = window.location.origin + "/membership/index.php?tag=" + tag,
                    $iframeFlow = $("<iframe src='" + flowURL + "'>");

                this.$el.show()
                    .append($iframeFlow);
                this.$game.hide();
            },

            close: function(success) {
                this.$el.hide().html("");
                this.$game.show();
                if (!_.isUndefined(this.closeCallback)) {
                    this.closeCallback(success);
                }
            }
        };

        if (isiOS) {
            prodigyWeb.membershipFlow.$el.addClass("iframe-ios-fix");
        }

        prodigyWeb.getClassCode = {
            open: function(callback) {
                var classCodeModal = new SW.GetClassCodeModalView({
                    model: new SW.GetClassCodeModal()
                });
                classCodeModal.callback = callback;
                classCodeModal.render();
            }
        };
    </script>
